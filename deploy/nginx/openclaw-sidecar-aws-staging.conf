# Example Nginx fragment for publishing openclaw-3agent-sidecar on the current AWS host.
#
# Context confirmed on 2026-03-14:
# - existing public domain: ec2-13-60-187-160.eu-north-1.compute.amazonaws.com
# - existing Nginx routes:
#   - /feishu/ -> 127.0.0.1:8765
#   - /        -> 127.0.0.1:18789
# - legacy three_agent_system currently occupies 127.0.0.1:9600
#
# Recommended first-pass approach for the new sidecar:
# - bind the new service to 127.0.0.1:9610
# - publish it under /sidecar/

location /sidecar/ {
    proxy_pass http://127.0.0.1:9610/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /sidecar;
    proxy_redirect off;
}

# After this route is enabled, the expected public base URL becomes:
# https://ec2-13-60-187-160.eu-north-1.compute.amazonaws.com/sidecar
